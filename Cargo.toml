[package]
name = "file_system_a_star"
version = "0.1.0"
edition = "2021"
description = "Parallel file-system A* pathfinder: work-stealing scan, FxHash, mimalloc"
authors = ["sponge <sponge@unityailab.com>"]
license = "MIT"
readme = "README.md"

[dependencies]
mimalloc = { version = "0.1", default-features = false }
rustc-hash = "2"
crossbeam-deque = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lib]
name = "file_system_a_star"
path = "src/lib.rs"

[[bin]]
name = "file_system_a_star"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
